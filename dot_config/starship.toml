"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"

format = """
╭─$os$directory$git_branch$git_status$fill$nodejs$python$cmd_duration$time
╰─$character"""

[fill]
symbol = " "

[character]
success_symbol = "[❯](fg:green)"
error_symbol = "[❯](fg:red)"
format = "$symbol "

[os]
format = "[$symbol]($style)"
style = "fg:lavender"
disabled = false

[os.symbols]
Arch = " "

[directory]
format = "[$path ]($style)"
style = "fg:sky"
truncation_length = 0
truncate_to_repo = false


[git_branch]
format = "[$symbol$branch]($style)"
symbol = " "
style = "fg:blue"

[git_status]
format = '$ahead_behind$staged$modified$typechanged$renamed$deleted$untracked$conflicted$stashed'
ahead       = "[ ⇡${count}](mauve)"
behind      = "[ ⇣${count}](mauve)"
diverged    = "[ ⇡${ahead_count}⇣${behind_count}](peach)"
staged      = "[  +${count}](green)"
modified    = "[  ${count}](yellow)"
typechanged = "[ ±${count}](yellow)"
renamed     = "[ »${count}](yellow)"
deleted     = "[ ✘${count}](red)"
untracked   = "[  ${count}](red)"
conflicted  = "[ =${count}](red)"
stashed     = "[  ${count}](overlay1)"
up_to_date  = ""

[nodejs]
format = "[$symbol$version ]($style)"
symbol = " "
style = "fg:peach"

[python]
format = "[$symbol$virtualenv ]($style)"
symbol = " "
style = "fg:green"

[cmd_duration]
format = "[$duration ]($style)"
style = "fg:overlay1"
min_time = 500

[time]
disabled = false
format = "[$time ]($style)"
style = "fg:teal"
time_format = "%-I:%M%p"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
